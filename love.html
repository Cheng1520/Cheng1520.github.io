<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>给小柯宝宝 ❤</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; min-height: 100vh;
    background: radial-gradient(ellipse at center, #1a1028 0%, #0d0018 100%);
    font-family: "PingFang SC", "Microsoft YaHei", "STSong", "KaiTi", serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  /* === 星空背景 === */
  #bgCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* === 主容器 === */
  .stage {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 30px 20px;
    transition: opacity 0.6s, transform 0.6s;
  }
  .stage.hidden {
    opacity: 0; transform: translateY(30px); pointer-events: none;
    position: absolute; inset: 0;
  }

  /* === 问题标题 === */
  .q-title {
    color: #ffb8d4;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: bold;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 30px;
    text-shadow: 0 0 30px rgba(255,150,200,0.6);
    line-height: 1.6;
  }

  /* === 按钮 === */
  .btn-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

  .btn {
    border: none; outline: none;
    padding: 16px 40px;
    font-size: clamp(18px, 3vw, 24px);
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 4px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.92); }

  .btn-love {
    background: linear-gradient(135deg, #ff6b9d, #e91e63);
    color: #fff;
    box-shadow: 0 8px 30px rgba(233,30,99,0.5);
  }
  .btn-love:hover { box-shadow: 0 12px 40px rgba(233,30,99,0.7); transform: translateY(-2px); }

  .btn-no {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    border: 2px solid rgba(255,255,255,0.25);
  }
  .btn-no:hover { background: rgba(255,255,255,0.18); }

  /* === Canvas 动画层 === */
  #animCanvas {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
  }

  /* === 理由输入 === */
  .reason-box {
    width: min(400px, 90vw);
    min-height: 150px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    color: #fff;
    font-size: 18px;
    padding: 16px;
    resize: vertical;
    font-family: inherit;
    letter-spacing: 2px;
    line-height: 1.8;
  }
  .reason-box::placeholder { color: rgba(255,255,255,0.3); }
  .reason-box:focus { outline: none; border-color: #ff6b9d; }

  /* === 排序列表 === */
  .sort-list {
    width: min(420px, 90vw);
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .sort-item {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 14px 18px;
    color: #fff;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: grab;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.2s;
    touch-action: none;
  }
  .sort-item:active { cursor: grabbing; }
  .sort-item.drag-over { border-color: #ff6b9d; background: rgba(255,107,157,0.2); transform: scale(1.03); }
  .sort-item.dragging { opacity: 0.4; }
  .sort-rank {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #ff6b9d, #e91e63);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold; color: #fff;
    flex-shrink: 0; margin-right: 12px;
  }
  .sort-label { flex: 1; }

  .sort-arrows {
    display: flex; flex-direction: column; gap: 2px;
  }
  .sort-arrow {
    width: 28px; height: 22px;
    border: none; background: rgba(255,255,255,0.15);
    color: #fff; border-radius: 6px;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .sort-arrow:hover { background: rgba(255,255,255,0.3); }
  .sort-arrow:active { background: #e91e63; }

  /* === 最终画面 === */
  .final-text {
    color: #ffb8d4;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: bold;
    text-align: center;
    letter-spacing: 6px;
    line-height: 2;
    text-shadow: 0 0 30px rgba(255,150,200,0.6);
    animation: finalFadeIn 2s ease-out;
  }
  @keyframes finalFadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === 爱心雨 === */
  .heart-rain {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
  }
  .heart-drop {
    position: absolute;
    animation: heartFall var(--fall-dur) linear forwards;
    animation-delay: var(--fall-delay);
    opacity: 0;
    font-size: var(--size);
  }
  @keyframes heartFall {
    0%   { opacity: 0; transform: translateY(-60px) rotate(0deg) scale(0.5); }
    10%  { opacity: 1; }
    80%  { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(105vh) rotate(360deg) scale(1.2); }
  }

  /* === 已发送提示 === */
  .toast {
    position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(233,30,99,0.9); color: #fff;
    padding: 12px 28px; border-radius: 30px;
    font-size: 16px; letter-spacing: 3px;
    z-index: 100; animation: toastIn 0.4s ease-out;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* === 光标特效 === */
  .click-ripple {
    position: fixed; pointer-events: none; z-index: 20;
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(255,150,200,0.6);
    animation: ripple 0.8s ease-out forwards;
  }
  @keyframes ripple {
    0% { opacity: 1; transform: scale(0); }
    100% { opacity: 0; transform: scale(3); }
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="animCanvas"></canvas>
<div class="heart-rain" id="heartRain"></div>

<!-- ===== Stage 1: 你喜欢我吗 ===== -->
<div class="stage" id="stage1">
  <div class="q-title">你喜欢我吗？</div>
  <div class="btn-row">
    <button class="btn btn-love" id="btnYes" onclick="handleLoveYes()">❤️ 喜欢</button>
    <button class="btn btn-no" id="btnNo" onclick="handleLoveNo()">不喜欢</button>
  </div>
</div>

<!-- ===== Stage 2: 你愿意接受和我接吻吗 ===== -->
<div class="stage hidden" id="stage2">
  <div class="q-title">你愿意接受<br>和我接吻吗？</div>
  <div class="btn-row" id="stage2Btns">
    <button class="btn btn-love" onclick="handleKissYes()">💋 愿意</button>
    <button class="btn btn-no" onclick="handleKissNo()">不愿意</button>
  </div>
  <div id="kissReasonWrap" style="display:none; text-align:center;">
    <textarea class="reason-box" id="kissReason" placeholder="写下不愿意的理由…"></textarea>
    <button class="btn btn-love" style="margin-top:20px;" onclick="submitKissReason()">提交理由 💌</button>
  </div>
</div>

<!-- ===== Stage 3: 排序行程 ===== -->
<div class="stage hidden" id="stage3">
  <div class="q-title">帮我们的约会排个序吧 💕<br><span style="font-size:0.55em;color:rgba(255,255,255,0.5);">拖拽或点箭头调整顺序</span></div>
  <div class="sort-list" id="sortList"></div>
  <button class="btn btn-love" style="margin-top:28px;" onclick="submitSort()">排好啦！✨</button>
</div>

<!-- ===== Stage 4: 最终画面 ===== -->
<div class="stage hidden" id="stage4">
  <div class="final-text">
    🌸 祝我的小柯宝宝 🌸<br>
    <span style="font-size:1.3em;">💕 旅程愉快 💕</span>
  </div>
</div>

<!-- ===== 隐藏表单用于发送邮件 ===== -->
<form id="mailForm" action="https://formsubmit.co/king24364@qq.com" method="POST" style="display:none;">
  <input type="hidden" name="_subject" id="mailSubject">
  <input type="hidden" name="_template" value="table">
  <input type="text" name="_honey" style="display:none">
  <input type="hidden" name="content" id="mailContent">
  <input type="hidden" name="type" id="mailType">
</form>

<script>
// ==================== 星空背景 ====================
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let stars = [];

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', () => { resizeBg(); initStars(); });

function initStars() {
  stars = [];
  const count = Math.floor((bgCanvas.width * bgCanvas.height) / 2000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      r: Math.random() * 1.8 + 0.4,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      baseAlpha: Math.random() * 0.5 + 0.2,
    });
  }
}
initStars();

function drawStars(time) {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  for (const s of stars) {
    const alpha = s.baseAlpha + Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.4;
    bgCtx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, alpha))})`;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fill();
  }
}

// ==================== 动画 Canvas ====================
const animCanvas = document.getElementById('animCanvas');
const animCtx = animCanvas.getContext('2d');
let animParticles = [];

function resizeAnim() {
  animCanvas.width = window.innerWidth;
  animCanvas.height = window.innerHeight;
}
resizeAnim();
window.addEventListener('resize', resizeAnim);

function spawnAnimParticles(x, y, color, count = 40) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    animParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.008 + Math.random() * 0.025,
      size: 2 + Math.random() * 4,
      color,
    });
  }
}

function drawHeartPath(ctx, cx, cy, size) {
  ctx.beginPath();
  const s = size / 16;
  for (let t = 0; t < Math.PI * 2; t += 0.02) {
    const x = cx + s * 16 * Math.pow(Math.sin(t), 3);
    const y = cy - s * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
    if (t === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

let heartAnim = null;   // { phase, cx, cy, size, startTime }
let circleAnim = null;

function startHeartAnim(cx, cy) {
  heartAnim = { phase: 'grow', cx, cy, size: 0, targetSize: 160, startTime: performance.now(), trail: [] };
}

function startCircleAnim(cx, cy) {
  circleAnim = { phase: 'draw', cx, cy, radius: 0, targetRadius: 130, startTime: performance.now(), trail: [] };
}

function drawAnimLayer(time) {
  animCtx.clearRect(0, 0, animCanvas.width, animCanvas.height);

  // 画爱心
  if (heartAnim) {
    const h = heartAnim;
    if (h.phase === 'grow') {
      h.size += (h.targetSize - h.size) * 0.06;
      // trail sparkles
      if (Math.random() < 0.6) {
        h.trail.push({
          x: h.cx + (Math.random() - 0.5) * h.size * 0.6,
          y: h.cy + (Math.random() - 0.5) * h.size * 0.6,
          life: 1, size: 1 + Math.random() * 3,
        });
      }
      if (h.size >= h.targetSize * 0.98) { h.phase = 'pulse'; h.size = h.targetSize; }

      animCtx.save();
      animCtx.shadowColor = '#ff4081';
      animCtx.shadowBlur = 40;
      drawHeartPath(animCtx, h.cx, h.cy, h.size);
      animCtx.fillStyle = '#ff4081';
      animCtx.fill();
      animCtx.shadowBlur = 80;
      drawHeartPath(animCtx, h.cx, h.cy, h.size * 0.6);
      animCtx.fillStyle = '#ff80ab';
      animCtx.fill();
      animCtx.restore();
    } else if (h.phase === 'pulse') {
      const pulse = 1 + Math.sin(time * 0.005) * 0.06;
      const s = h.size * pulse;
      animCtx.save();
      animCtx.shadowColor = '#ff4081';
      animCtx.shadowBlur = 40;
      drawHeartPath(animCtx, h.cx, h.cy, s);
      animCtx.fillStyle = '#ff4081';
      animCtx.fill();
      animCtx.shadowBlur = 80;
      drawHeartPath(animCtx, h.cx, h.cy, s * 0.55);
      animCtx.fillStyle = '#ff80ab';
      animCtx.fill();
      animCtx.restore();
    }
    // trail
    for (let i = h.trail.length - 1; i >= 0; i--) {
      const t = h.trail[i];
      t.life -= 0.015;
      if (t.life <= 0) h.trail.splice(i, 1);
      else {
        animCtx.fillStyle = `rgba(255,150,200,${t.life})`;
        animCtx.beginPath();
        animCtx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
        animCtx.fill();
      }
    }
  }

  // 画圆圈
  if (circleAnim) {
    const c = circleAnim;
    if (c.phase === 'draw') {
      c.radius += (c.targetRadius - c.radius) * 0.05;
      if (c.radius >= c.targetRadius * 0.98) { c.phase = 'pulse'; c.radius = c.targetRadius; }
    } else if (c.phase === 'pulse') {
      c.radius = c.targetRadius + Math.sin(time * 0.004) * 8;
    }
    animCtx.save();
    animCtx.shadowColor = '#ff80ab';
    animCtx.shadowBlur = 30;
    animCtx.strokeStyle = '#ff80ab';
    animCtx.lineWidth = 4;
    animCtx.beginPath();
    animCtx.arc(c.cx, c.cy, c.radius, 0, Math.PI * 2);
    animCtx.stroke();
    // inner glow
    animCtx.shadowBlur = 60;
    animCtx.strokeStyle = 'rgba(255,180,200,0.6)';
    animCtx.lineWidth = 2;
    animCtx.beginPath();
    animCtx.arc(c.cx, c.cy, c.radius * 0.94, 0, Math.PI * 2);
    animCtx.stroke();
    animCtx.restore();

    // 文字
    if (Math.sin(time * 0.003) > -0.5) {
      animCtx.fillStyle = '#ffb8d4';
      animCtx.font = 'bold 22px "PingFang SC","Microsoft YaHei",serif';
      animCtx.textAlign = 'center';
      animCtx.shadowColor = '#ff4081';
      animCtx.shadowBlur = 15;
      animCtx.fillText('画个圈圈代表我爱你', c.cx, c.cy + c.targetRadius + 50);
      animCtx.shadowBlur = 0;
    }
  }

  // 粒子
  for (let i = animParticles.length - 1; i >= 0; i--) {
    const p = animParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { animParticles.splice(i, 1); continue; }
    animCtx.fillStyle = p.color.replace('1)', `${p.life})`);
    animCtx.beginPath();
    animCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    animCtx.fill();
  }
}

// ==================== 爱心雨 ====================
const heartRain = document.getElementById('heartRain');
let rainInterval = null;

function startHeartRain() {
  if (rainInterval) return;
  rainInterval = setInterval(() => {
    const drop = document.createElement('div');
    drop.className = 'heart-drop';
    drop.textContent = ['💕', '💗', '💖', '💝', '💘', '✨', '🌸', '🩷'][Math.floor(Math.random() * 8)];
    drop.style.cssText = `
      left: ${Math.random() * 100}%;
      top: -40px;
      --fall-dur: ${2.5 + Math.random() * 4}s;
      --fall-delay: ${Math.random() * 0.3}s;
      --size: ${18 + Math.random() * 30}px;
    `;
    heartRain.appendChild(drop);
    setTimeout(() => drop.remove(), 7000);
  }, 400);
}

// ==================== 涟漪特效 ====================
document.addEventListener('click', (e) => {
  if (e.target.closest('.btn') || e.target.closest('.sort-item') || e.target.closest('.sort-arrow')) return;
  const ripple = document.createElement('div');
  ripple.className = 'click-ripple';
  ripple.style.left = (e.clientX - 15) + 'px';
  ripple.style.top = (e.clientY - 15) + 'px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
});

// ==================== Toast ====================
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.5s'; }, 2000);
  setTimeout(() => t.remove(), 2600);
}

// ==================== 阶段切换 ====================
function switchStage(fromId, toId) {
  const from = document.getElementById(fromId);
  const to = document.getElementById(toId);
  from.classList.add('hidden');
  to.classList.remove('hidden');
  to.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ==================== Stage 1: 你喜欢我吗 ====================
let loveNoCount = 0;
let loveBtnScale = 1;

function handleLoveYes() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  spawnAnimParticles(cx, cy, 'rgba(255,64,129,1)', 80);
  startHeartAnim(cx, cy);
  startHeartRain();
  setTimeout(() => switchStage('stage1', 'stage2'), 1500);
}

function handleLoveNo() {
  loveNoCount++;
  loveBtnScale += 0.25;
  const btn = document.getElementById('btnYes');
  btn.style.transform = `scale(${loveBtnScale})`;
  btn.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  // 不喜欢按钮缩小
  const noBtn = document.getElementById('btnNo');
  noBtn.style.transform = `scale(${Math.max(0.4, 1 - loveNoCount * 0.15)})`;

  const phrases = [
    '真的不喜欢吗？🥺', '再想想嘛…💔', '给你一次机会重新选！', '我的心要碎了…😢',
    '要不要再考虑一下？', '不许选这个！😠', '这个按钮快坏了…', '求求你点另一边吧 🙏',
    '你忍心吗…💧', '不管，你必须喜欢我！'
  ];
  showToast(phrases[Math.min(loveNoCount - 1, phrases.length - 1)]);

  if (loveNoCount >= 5) {
    document.getElementById('btnNo').style.opacity = '0.3';
    document.getElementById('btnNo').style.pointerEvents = 'none';
  }
}

// ==================== Stage 2: 接吻 ====================
function handleKissYes() {
  showToast('💋 亲到了！');
  spawnAnimParticles(window.innerWidth / 2, window.innerHeight / 2, 'rgba(255,128,171,1)', 60);
  startCircleAnim(window.innerWidth / 2, window.innerHeight / 2 - 30);
  setTimeout(() => switchStage('stage2', 'stage3'), 2000);
}

function handleKissNo() {
  document.getElementById('stage2Btns').style.display = 'none';
  document.getElementById('kissReasonWrap').style.display = 'block';
}

function submitKissReason() {
  const reason = document.getElementById('kissReason').value.trim();
  if (!reason) { showToast('请写下理由再提交哦～'); return; }
  sendMail('不愿意接吻的理由', reason);
  showToast('已收到你的理由～💌');
  document.getElementById('kissReasonWrap').innerHTML =
    '<p style="color:#ffb8d4;font-size:20px;letter-spacing:3px;">已收到你的心声 💌</p>';
  setTimeout(() => switchStage('stage2', 'stage3'), 1200);
}

// ==================== Stage 3: 排序 ====================
const places = [
  '鱼尾州', '朝阳江滩公园', '双港汇创意产业园',
  '万象城', '荔枝餐厅', '西西弗书店'
];
let sortOrder = [...places];

function initSortList() {
  const list = document.getElementById('sortList');
  list.innerHTML = '';
  sortOrder.forEach((place, i) => {
    const item = document.createElement('div');
    item.className = 'sort-item';
    item.draggable = true;
    item.dataset.index = i;
    item.dataset.name = place;
    item.innerHTML = `
      <span class="sort-rank">${i + 1}</span>
      <span class="sort-label">${place}</span>
      <div class="sort-arrows">
        <button class="sort-arrow" data-dir="up" ${i === 0 ? 'disabled' : ''}>▲</button>
        <button class="sort-arrow" data-dir="down" ${i === sortOrder.length - 1 ? 'disabled' : ''}>▼</button>
      </div>
    `;
    // Drag events
    item.addEventListener('dragstart', onDragStart);
    item.addEventListener('dragover', onDragOver);
    item.addEventListener('dragleave', onDragLeave);
    item.addEventListener('drop', onDrop);
    item.addEventListener('dragend', onDragEnd);
    // Arrow clicks
    item.querySelectorAll('.sort-arrow').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const dir = btn.dataset.dir;
        const idx = parseInt(item.dataset.index);
        moveItem(idx, dir === 'up' ? -1 : 1);
      });
    });
    list.appendChild(item);
  });
}

function moveItem(fromIdx, delta) {
  const toIdx = fromIdx + delta;
  if (toIdx < 0 || toIdx >= sortOrder.length) return;
  const [moved] = sortOrder.splice(fromIdx, 1);
  sortOrder.splice(toIdx, 0, moved);
  refreshSortUI();
}

let dragIdx = null;

function onDragStart(e) {
  dragIdx = parseInt(e.target.dataset.index);
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', e.target.dataset.name);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.target.closest('.sort-item')?.classList.add('drag-over');
}

function onDragLeave(e) {
  e.target.closest('.sort-item')?.classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  e.target.closest('.sort-item')?.classList.remove('drag-over');
  const targetItem = e.target.closest('.sort-item');
  if (!targetItem || dragIdx === null) return;
  const toIdx = parseInt(targetItem.dataset.index);
  if (dragIdx === toIdx) return;
  const [moved] = sortOrder.splice(dragIdx, 1);
  sortOrder.splice(toIdx, 0, moved);
  refreshSortUI();
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.sort-item').forEach(el => el.classList.remove('drag-over'));
  dragIdx = null;
}

function refreshSortUI() {
  const list = document.getElementById('sortList');
  const items = list.querySelectorAll('.sort-item');
  items.forEach((item, i) => {
    item.dataset.index = i;
    item.querySelector('.sort-rank').textContent = i + 1;
    item.querySelector('.sort-label').textContent = sortOrder[i];
    item.dataset.name = sortOrder[i];
    // Update arrow disabled states
    const [upBtn, downBtn] = item.querySelectorAll('.sort-arrow');
    upBtn.disabled = i === 0;
    downBtn.disabled = i === sortOrder.length - 1;
  });
}

function submitSort() {
  const ranked = sortOrder.map((p, i) => `${i + 1}. ${p}`).join('\n');
  sendMail('小柯的行程排序', ranked);
  showToast('已发送排序结果！✨');
  setTimeout(() => switchStage('stage3', 'stage4'), 1000);
}

// ==================== 邮件发送 ====================
function sendMail(subject, content) {
  const form = document.getElementById('mailForm');
  document.getElementById('mailSubject').value = subject;
  document.getElementById('mailContent').value = content;
  document.getElementById('mailType').value = subject;

  // Try AJAX first
  fetch('https://formsubmit.co/ajax/king24364@qq.com', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ subject: subject, content: content })
  }).catch(() => {
    // Fallback: open mailto
    const mailto = `mailto:king24364@qq.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(content)}`;
    window.open(mailto, '_blank');
  });
}

// ==================== 主循环 ====================
function mainLoop(time) {
  drawStars(time);
  drawAnimLayer(time);
  requestAnimationFrame(mainLoop);
}

// ==================== 初始化 ====================
initSortList();
requestAnimationFrame(mainLoop);
</script>

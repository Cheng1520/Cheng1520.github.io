<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圣诞树</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: grab; }
  body:active { cursor: grabbing; }
  canvas { display: block; }
</style>
</head>
<body>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.00008);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(2, 3, 14);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 5;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI * 0.7;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.update();

// ===== Color Palettes =====
const treeColors = [0x00ff88, 0x00cc66, 0x33ff99, 0x00dd55, 0x22ff77, 0x00ff66, 0x44ffaa, 0x00bb44, 0x55ffbb, 0x00ee77];
const ornamentColors = [0xff2255, 0xff6600, 0xffdd00, 0xff0088, 0xff3300, 0xffaa00, 0xff00cc, 0x00ccff, 0xff4400, 0xff88cc, 0x00ffff, 0xff5500];
const sparkColors = [0xffd700, 0xff6b9d, 0x12c2e9, 0xc471ed, 0xffaa00, 0xff4488, 0x44ddff, 0xffdd44];

// ===== Particle Tree =====
const treeGroup = new THREE.Group();
scene.add(treeGroup);

const treeHeight = 7;
const baseRadius = 2.5;
const treeParticleCount = 4000;
const treeGeom = new THREE.BufferGeometry();
const treePositions = new Float32Array(treeParticleCount * 3);
const treeColorsArr = new Float32Array(treeParticleCount * 3);
const treeSizes = new Float32Array(treeParticleCount);

for (let i = 0; i < treeParticleCount; i++) {
  const y = Math.random() * treeHeight;
  const radiusAtY = baseRadius * (1 - y / treeHeight) * (0.85 + Math.random() * 0.3);
  const angle = Math.random() * Math.PI * 2;
  const r = radiusAtY * (0.5 + Math.random() * 0.5);
  treePositions[i * 3] = Math.cos(angle) * r;
  treePositions[i * 3 + 1] = y;
  treePositions[i * 3 + 2] = Math.sin(angle) * r;

  const color = new THREE.Color(treeColors[Math.floor(Math.random() * treeColors.length)]);
  treeColorsArr[i * 3] = color.r;
  treeColorsArr[i * 3 + 1] = color.g;
  treeColorsArr[i * 3 + 2] = color.b;
  treeSizes[i] = 0.03 + Math.random() * 0.08;
}
treeGeom.setAttribute('position', new THREE.BufferAttribute(treePositions, 3));
treeGeom.setAttribute('color', new THREE.BufferAttribute(treeColorsArr, 3));
treeGeom.setAttribute('size', new THREE.BufferAttribute(treeSizes, 1));

const treeMat = new THREE.PointsMaterial({
  size: 0.06,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.9,
  map: (() => {
    const c = document.createElement('canvas');
    c.width = 32; c.height = 32;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.2, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.4)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 32, 32);
    return new THREE.CanvasTexture(c);
  })(),
});
const treePoints = new THREE.Points(treeGeom, treeMat);
treeGroup.add(treePoints);

// ===== Trunk Particles =====
const trunkCount = 400;
const trunkGeom = new THREE.BufferGeometry();
const trunkPositions = new Float32Array(trunkCount * 3);
const trunkColorsArr = new Float32Array(trunkCount * 3);
for (let i = 0; i < trunkCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * 0.35;
  const y = Math.random() * 1.0 - 0.3;
  trunkPositions[i * 3] = Math.cos(angle) * r;
  trunkPositions[i * 3 + 1] = y;
  trunkPositions[i * 3 + 2] = Math.sin(angle) * r;
  const c = new THREE.Color().setHSL(0.08, 0.8, 0.2 + Math.random() * 0.3);
  trunkColorsArr[i * 3] = c.r;
  trunkColorsArr[i * 3 + 1] = c.g;
  trunkColorsArr[i * 3 + 2] = c.b;
}
trunkGeom.setAttribute('position', new THREE.BufferAttribute(trunkPositions, 3));
trunkGeom.setAttribute('color', new THREE.BufferAttribute(trunkColorsArr, 3));
const trunkPoints = new THREE.Points(trunkGeom, new THREE.PointsMaterial({
  size: 0.05, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.7,
  map: treeMat.map,
}));
treeGroup.add(trunkPoints);

// ===== Ornament Particles =====
const ornamentCount = 600;
const ornamentGroup = new THREE.Group();
treeGroup.add(ornamentGroup);
const ornamentDataArr = [];

for (let i = 0; i < ornamentCount; i++) {
  const y = 0.5 + Math.random() * (treeHeight - 0.8);
  const radiusAtY = baseRadius * (1 - y / treeHeight);
  const angle = Math.random() * Math.PI * 2;
  const r = radiusAtY * (0.5 + Math.random() * 0.5);
  const color = new THREE.Color(ornamentColors[Math.floor(Math.random() * ornamentColors.length)]);

  const geom = new THREE.SphereGeometry(0.04 + Math.random() * 0.08, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
  const ornament = new THREE.Mesh(geom, mat);
  ornament.position.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
  ornamentGroup.add(ornament);
  ornamentDataArr.push({
    mesh: ornament,
    baseY: y,
    baseX: Math.cos(angle) * r,
    baseZ: Math.sin(angle) * r,
    color,
    speed: 0.5 + Math.random() * 2,
    phase: Math.random() * Math.PI * 2,
    amplitude: 0.05 + Math.random() * 0.3,
  });
}

// ===== Star Top =====
const starGroup = new THREE.Group();
starGroup.position.y = treeHeight + 0.2;
treeGroup.add(starGroup);

const starParticleCount = 300;
const starGeom = new THREE.BufferGeometry();
const starPositions = new Float32Array(starParticleCount * 3);
const starColorsArr = new Float32Array(starParticleCount * 3);

for (let i = 0; i < starParticleCount; i++) {
  const phi = Math.random() * Math.PI;
  const theta = Math.random() * Math.PI * 2;
  const r = 0.1 + Math.random() * 0.5;
  const sx = r * Math.sin(phi) * Math.cos(theta);
  const sy = r * Math.sin(phi) * Math.sin(theta) * 0.5;
  const sz = r * Math.cos(phi);
  starPositions[i * 3] = sx;
  starPositions[i * 3 + 1] = sy;
  starPositions[i * 3 + 2] = sz;

  const c = new THREE.Color().setHSL(0.12 + Math.random() * 0.08, 1, 0.5 + Math.random() * 0.5);
  starColorsArr[i * 3] = c.r;
  starColorsArr[i * 3 + 1] = c.g;
  starColorsArr[i * 3 + 2] = c.b;
}
starGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeom.setAttribute('color', new THREE.BufferAttribute(starColorsArr, 3));
const starPoints = new THREE.Points(starGeom, new THREE.PointsMaterial({
  size: 0.06, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.9,
  map: treeMat.map,
}));
starGroup.add(starPoints);

// ===== Snowflakes =====
const snowCount = 1000;
const snowGeom = new THREE.BufferGeometry();
const snowPositions = new Float32Array(snowCount * 3);
const snowColorsArr = new Float32Array(snowCount * 3);
const snowData = [];

for (let i = 0; i < snowCount; i++) {
  snowPositions[i * 3] = (Math.random() - 0.5) * 30;
  snowPositions[i * 3 + 1] = Math.random() * 18;
  snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 30;
  const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.1, 0.1, 0.7 + Math.random() * 0.3);
  snowColorsArr[i * 3] = c.r;
  snowColorsArr[i * 3 + 1] = c.g;
  snowColorsArr[i * 3 + 2] = c.b;
  snowData.push({
    speedY: 0.01 + Math.random() * 0.06,
    speedX: (Math.random() - 0.5) * 0.02,
    speedZ: (Math.random() - 0.5) * 0.02,
    wobbleAmp: 0.2 + Math.random() * 0.8,
    wobbleSpeed: 0.3 + Math.random() * 1.5,
    phase: Math.random() * Math.PI * 2,
  });
}
snowGeom.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
snowGeom.setAttribute('color', new THREE.BufferAttribute(snowColorsArr, 3));
const snowPoints = new THREE.Points(snowGeom, new THREE.PointsMaterial({
  size: 0.12, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.7,
  map: treeMat.map,
}));
scene.add(snowPoints);

// ===== Colorful Sparkle Rings =====
const ringCount = 400;
const ringGeom = new THREE.BufferGeometry();
const ringPositions = new Float32Array(ringCount * 3);
const ringColorsArr = new Float32Array(ringCount * 3);
const ringData = [];

for (let i = 0; i < ringCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const height = 1 + Math.random() * (treeHeight - 1.5);
  const radiusAtH = baseRadius * (1 - height / treeHeight) + 0.3;
  const r = radiusAtH * (0.7 + Math.random() * 0.3);
  ringPositions[i * 3] = Math.cos(angle) * r;
  ringPositions[i * 3 + 1] = height;
  ringPositions[i * 3 + 2] = Math.sin(angle) * r;

  const c = new THREE.Color(sparkColors[Math.floor(Math.random() * sparkColors.length)]);
  ringColorsArr[i * 3] = c.r;
  ringColorsArr[i * 3 + 1] = c.g;
  ringColorsArr[i * 3 + 2] = c.b;

  ringData.push({ angle, radius: r, baseHeight: height, speed: 0.3 + Math.random() * 1.2, phase: Math.random() * Math.PI * 2 });
}
ringGeom.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
ringGeom.setAttribute('color', new THREE.BufferAttribute(ringColorsArr, 3));
const ringPoints = new THREE.Points(ringGeom, new THREE.PointsMaterial({
  size: 0.07, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.8,
  map: treeMat.map,
}));
treeGroup.add(ringPoints);

// ===== Burst Particles (firework-like) =====
const burstCount = 300;
const burstGeom = new THREE.BufferGeometry();
const burstPositions = new Float32Array(burstCount * 3);
const burstColorsArr = new Float32Array(burstCount * 3);
const burstData = [];

function randomBurstPos() {
  const h = 2 + Math.random() * 5;
  const ra = baseRadius * (1 - h / treeHeight);
  const a = Math.random() * Math.PI * 2;
  const rd = ra * (0.5 + Math.random() * 0.5);
  return { x: Math.cos(a) * rd, y: h, z: Math.sin(a) * rd };
}

for (let i = 0; i < burstCount; i++) {
  const p = randomBurstPos();
  burstPositions[i * 3] = p.x;
  burstPositions[i * 3 + 1] = p.y;
  burstPositions[i * 3 + 2] = p.z;

  const c = new THREE.Color(sparkColors[Math.floor(Math.random() * sparkColors.length)]);
  burstColorsArr[i * 3] = c.r;
  burstColorsArr[i * 3 + 1] = c.g;
  burstColorsArr[i * 3 + 2] = c.b;

  burstData.push({
    originX: p.x, originY: p.y, originZ: p.z,
    vx: (Math.random() - 0.5) * 0.06,
    vy: 0.02 + Math.random() * 0.08,
    vz: (Math.random() - 0.5) * 0.06,
    life: 0,
    maxLife: 1.5 + Math.random() * 3,
    phase: Math.random() * Math.PI * 2,
    delay: Math.random() * 5,
  });
}
burstGeom.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
burstGeom.setAttribute('color', new THREE.BufferAttribute(burstColorsArr, 3));
const burstPoints = new THREE.Points(burstGeom, new THREE.PointsMaterial({
  size: 0.05, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.8,
  map: treeMat.map,
}));
treeGroup.add(burstPoints);

// ===== Ground Glow =====
const groundGeom = new THREE.RingGeometry(1.5, 3.5, 64);
const groundMat = new THREE.MeshBasicMaterial({
  color: 0x113355,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.3,
});
const groundRing = new THREE.Mesh(groundGeom, groundMat);
groundRing.rotation.x = -Math.PI / 2;
groundRing.position.y = -0.1;
scene.add(groundRing);

// Small ground sparkles
const gSparkCount = 500;
const gSparkGeom = new THREE.BufferGeometry();
const gSparkPositions = new Float32Array(gSparkCount * 3);
const gSparkColors = new Float32Array(gSparkCount * 3);
for (let i = 0; i < gSparkCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 1.8 + Math.random() * 3.5;
  gSparkPositions[i * 3] = Math.cos(angle) * r;
  gSparkPositions[i * 3 + 1] = 0.02;
  gSparkPositions[i * 3 + 2] = Math.sin(angle) * r;
  const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.5, 0.3 + Math.random() * 0.5);
  gSparkColors[i * 3] = c.r;
  gSparkColors[i * 3 + 1] = c.g;
  gSparkColors[i * 3 + 2] = c.b;
}
gSparkGeom.setAttribute('position', new THREE.BufferAttribute(gSparkPositions, 3));
gSparkGeom.setAttribute('color', new THREE.BufferAttribute(gSparkColors, 3));
const gSparkPoints = new THREE.Points(gSparkGeom, new THREE.PointsMaterial({
  size: 0.06, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.6,
  map: treeMat.map,
}));
scene.add(gSparkPoints);

// ===== Animate =====
const clock = new THREE.Clock();
const mouse = new THREE.Vector2();

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const time = performance.now() * 0.001;

  controls.update();

  // Tree sway
  treeGroup.rotation.z = Math.sin(time * 0.4) * 0.03;
  treeGroup.rotation.x = Math.cos(time * 0.35) * 0.02;

  // Ornament float animation
  ornamentDataArr.forEach(d => {
    const oy = d.baseY + Math.sin(time * d.speed + d.phase) * d.amplitude;
    const ox = d.baseX + Math.cos(time * d.speed * 1.3 + d.phase) * d.amplitude * 0.5;
    const oz = d.baseZ + Math.sin(time * d.speed * 0.9 + d.phase + 1) * d.amplitude * 0.5;
    d.mesh.position.set(ox, oy, oz);
    d.mesh.material.opacity = 0.5 + Math.sin(time * 3 + d.phase) * 0.5;
    const s = 0.7 + Math.sin(time * 2.5 + d.phase) * 0.3;
    d.mesh.scale.setScalar(s);
  });

  // Ring spiral
  const ringPos = ringPoints.geometry.attributes.position.array;
  for (let i = 0; i < ringCount; i++) {
    const d = ringData[i];
    const a = d.angle + time * d.speed * 0.5;
    const h = d.baseHeight + Math.sin(time * d.speed + d.phase) * 0.6;
    const r = d.radius + Math.cos(time * d.speed * 0.7 + d.phase) * 0.2;
    ringPos[i * 3] = Math.cos(a) * r;
    ringPos[i * 3 + 1] = Math.max(0.5, Math.min(treeHeight - 0.3, h));
    ringPos[i * 3 + 2] = Math.sin(a) * r;
  }
  ringPoints.geometry.attributes.position.needsUpdate = true;
  ringPoints.material.opacity = 0.4 + Math.sin(time * 1.5) * 0.3;

  // Star pulse and rotation
  starGroup.rotation.y += dt * 1.2;
  starGroup.rotation.x = Math.sin(time * 1.7) * 0.3;
  const starScale = 1 + Math.sin(time * 3) * 0.2;
  starGroup.scale.setScalar(starScale);
  starPoints.material.opacity = 0.6 + Math.sin(time * 2.5) * 0.4;

  // Snow
  const snowPos = snowPoints.geometry.attributes.position.array;
  for (let i = 0; i < snowCount; i++) {
    const d = snowData[i];
    snowPos[i * 3] += d.speedX + Math.sin(time * d.wobbleSpeed + d.phase) * 0.005;
    snowPos[i * 3 + 1] -= d.speedY;
    snowPos[i * 3 + 2] += d.speedZ + Math.cos(time * d.wobbleSpeed + d.phase) * 0.005;

    if (snowPos[i * 3 + 1] < -0.5) {
      snowPos[i * 3 + 1] = 17;
      snowPos[i * 3] = (Math.random() - 0.5) * 30;
      snowPos[i * 3 + 2] = (Math.random() - 0.5) * 30;
    }
    if (Math.abs(snowPos[i * 3]) > 16) snowPos[i * 3] *= -0.9;
    if (Math.abs(snowPos[i * 3 + 2]) > 16) snowPos[i * 3 + 2] *= -0.9;
  }
  snowPoints.geometry.attributes.position.needsUpdate = true;

  // Burst particles
  const burstPos = burstPoints.geometry.attributes.position.array;
  const burstCol = burstPoints.geometry.attributes.color.array;
  for (let i = 0; i < burstCount; i++) {
    const d = burstData[i];
    d.life += dt;
    if (d.life < d.delay) {
      burstPos[i * 3] = d.originX;
      burstPos[i * 3 + 1] = d.originY;
      burstPos[i * 3 + 2] = d.originZ;
      burstCol[i * 3] = 0;
      burstCol[i * 3 + 1] = 0;
      burstCol[i * 3 + 2] = 0;
    } else if (d.life > d.delay + d.maxLife) {
      const p = randomBurstPos();
      d.originX = p.x; d.originY = p.y; d.originZ = p.z;
      d.vx = (Math.random() - 0.5) * 0.06;
      d.vy = 0.02 + Math.random() * 0.08;
      d.vz = (Math.random() - 0.5) * 0.06;
      d.maxLife = 1.5 + Math.random() * 3;
      d.delay = d.life + Math.random() * 3;
      burstPos[i * 3] = p.x;
      burstPos[i * 3 + 1] = p.y;
      burstPos[i * 3 + 2] = p.z;
      burstCol[i * 3] = 0;
      burstCol[i * 3 + 1] = 0;
      burstCol[i * 3 + 2] = 0;
    } else {
      const elapsed = d.life - d.delay;
      const progress = elapsed / d.maxLife;
      burstPos[i * 3] = d.originX + d.vx * elapsed * 3;
      burstPos[i * 3 + 1] = d.originY + d.vy * elapsed * 2;
      burstPos[i * 3 + 2] = d.originZ + d.vz * elapsed * 3;
      const alpha = 1 - progress;
      const c = new THREE.Color(sparkColors[Math.floor(Math.random() * sparkColors.length)]);
      burstCol[i * 3] = c.r * alpha;
      burstCol[i * 3 + 1] = c.g * alpha;
      burstCol[i * 3 + 2] = c.b * alpha;
    }
  }
  burstPoints.geometry.attributes.position.needsUpdate = true;
  burstPoints.geometry.attributes.color.needsUpdate = true;

  // Ground ring pulse
  groundRing.material.opacity = 0.15 + Math.sin(time * 1.5) * 0.1;
  groundRing.scale.setScalar(1 + Math.sin(time * 2) * 0.05);

  // Ground sparkles
  gSparkPoints.rotation.y += dt * 0.1;
  const gSparkPos = gSparkPoints.geometry.attributes.position.array;
  for (let i = 0; i < gSparkCount; i++) {
    gSparkPos[i * 3 + 1] = 0.02 + Math.abs(Math.sin(time * 2 + i * 0.1)) * 0.1;
  }
  gSparkPoints.geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>

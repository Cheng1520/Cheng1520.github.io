<script>
// Typewriter effect for hero subtitle
(function() {
  const el = document.getElementById('hero-subtitle');
  if (!el) return;
  const text = '江西省南昌市新建二中 · 高一学生';
  const cursor = el.querySelector('.cursor');
  let i = 0;
  function type() {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i]), cursor);
      i++;
      setTimeout(type, 60 + Math.random() * 40);
    }
  }
  // Start after intro overlay fades
  setTimeout(type, 3000);
})();

// Number count-up animation
(function() {
  const nums = document.querySelectorAll('.hero-stat-num[data-target]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const target = parseFloat(el.dataset.target);
        const suffix = el.dataset.suffix || '';
        const isInt = Number.isInteger(target);
        const duration = 1500;
        const start = performance.now();
        const startVal = 0;
        function update(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = startVal + (target - startVal) * eased;
          el.textContent = (isInt ? Math.round(current) : current.toFixed(1)) + suffix;
          if (progress < 1) requestAnimationFrame(update);
          else { el.textContent = target + suffix; el.classList.add('counted'); }
        }
        requestAnimationFrame(update);
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.5 });
  nums.forEach(n => observer.observe(n));
})();
</script>
